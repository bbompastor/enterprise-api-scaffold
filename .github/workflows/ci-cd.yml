name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository }}/api
  HELM_VERSION: v3.14.4

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: |
          python -m compileall api tests
          python -m unittest discover -s tests -v

  validate-chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Lint and render chart
        run: |
          helm lint helm/api -f helm/api/values.yaml -f helm/api/values-dev.yaml
          helm lint helm/api -f helm/api/values.yaml -f helm/api/values-prod.yaml
          helm template dev-api helm/api -f helm/api/values.yaml -f helm/api/values-dev.yaml > /dev/null
          helm template api helm/api -f helm/api/values.yaml -f helm/api/values-prod.yaml > /dev/null

  build-and-push:
    needs: [test, validate-chart]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}

  deploy-prod:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    strategy:
      fail-fast: false
      matrix:
        include:
          - region: us-east-1
            kubeconfig_secret: KUBECONFIG_US_EAST_1
          - region: eu-west-1
            kubeconfig_secret: KUBECONFIG_EU_WEST_1
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Deploy to ${{ matrix.region }}
        env:
          KUBECONFIG_B64: ${{ secrets[matrix.kubeconfig_secret] }}
        run: |
          echo "$KUBECONFIG_B64" | base64 -d > kubeconfig
          export KUBECONFIG="$PWD/kubeconfig"
          helm upgrade --install api helm/api \
            -f helm/api/values.yaml \
            -f helm/api/values-prod.yaml \
            --namespace enterprise-api \
            --create-namespace \
            --set image.repository="${{ env.IMAGE_NAME }}" \
            --set image.tag="${{ needs.build-and-push.outputs.image_tag }}" \
            --set env.region="${{ matrix.region }}" \
            --wait --timeout 5m

  deploy-dev:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: development
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Deploy to dev cluster
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_DEV }}
        run: |
          echo "$KUBECONFIG_B64" | base64 -d > kubeconfig
          export KUBECONFIG="$PWD/kubeconfig"
          helm upgrade --install dev-api helm/api \
            -f helm/api/values.yaml \
            -f helm/api/values-dev.yaml \
            --namespace enterprise-api \
            --create-namespace \
            --set image.repository="${{ env.IMAGE_NAME }}" \
            --set image.tag="${{ needs.build-and-push.outputs.image_tag }}" \
            --set env.region="dev-cluster" \
            --wait --timeout 5m
