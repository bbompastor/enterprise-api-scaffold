name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository }}/api
  HELM_VERSION: v3.14.4

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: |
          python -m compileall api tests
          python -m unittest discover -s tests -v

  validate-chart:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Lint and render chart
        run: |
          helm lint helm/api -f helm/api/values.yaml -f helm/api/values-dev.yaml
          helm lint helm/api -f helm/api/values.yaml -f helm/api/values-prod.yaml
          helm template dev-api helm/api -f helm/api/values.yaml -f helm/api/values-dev.yaml > /dev/null
          helm template api helm/api -f helm/api/values.yaml -f helm/api/values-prod.yaml > /dev/null

  build-and-push:
    needs: [test, validate-chart]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}

  deploy-prod:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    strategy:
      fail-fast: false
      matrix:
        include:
          - region: us-east-1
            kubeconfig_secret: KUBECONFIG_US_EAST_1
          - region: eu-west-1
            kubeconfig_secret: KUBECONFIG_EU_WEST_1
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Deploy to ${{ matrix.region }}
        env:
          KUBECONFIG_B64: ${{ secrets[matrix.kubeconfig_secret] }}
        run: |
          if [ -z "$KUBECONFIG_B64" ]; then
            echo "WARNING: Secret '${{ matrix.kubeconfig_secret }}' is not set."
            echo "Skipping actual deployment and executing client-side template validation as a fallback."
            helm template api helm/api \
              -f helm/api/values.yaml \
              -f helm/api/values-prod.yaml \
              --namespace enterprise-api \
              --set image.repository="${{ env.IMAGE_NAME }}" \
              --set image.tag="${{ needs.build-and-push.outputs.image_tag }}" \
              --set env.region="${{ matrix.region }}"
          else
            echo "$KUBECONFIG_B64" | base64 -d > kubeconfig
            chmod 600 kubeconfig
            export KUBECONFIG="$PWD/kubeconfig"
            helm upgrade --install api helm/api \
              -f helm/api/values.yaml \
              -f helm/api/values-prod.yaml \
              --namespace enterprise-api \
              --create-namespace \
              --set image.repository="${{ env.IMAGE_NAME }}" \
              --set image.tag="${{ needs.build-and-push.outputs.image_tag }}" \
              --set env.region="${{ matrix.region }}" \
              --wait --timeout 5m
          fi

  deploy-dev:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: development
    env:
      KUBECONFIG_B64: ${{ secrets.KUBECONFIG_DEV }}
    steps:
      - uses: actions/checkout@v4

      - name: Create k8s Kind Cluster
        if: ${{ env.KUBECONFIG_B64 == '' }}
        uses: helm/kind-action@v1.9.0

      - name: Setup Helm
        if: ${{ env.KUBECONFIG_B64 != '' }}
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Build and load local image to Kind (local validation fallback)
        if: ${{ env.KUBECONFIG_B64 == '' }}
        run: |
          docker build -t api:local .
          kind load docker-image api:local --name chart-testing

      - name: Deploy to dev cluster
        run: |
          if [ -z "$KUBECONFIG_B64" ]; then
            echo "Secret 'KUBECONFIG_DEV' is not set. Executing deployment validation on local Kind cluster."
            helm upgrade --install dev-api helm/api \
              -f helm/api/values.yaml \
              -f helm/api/values-dev.yaml \
              --namespace enterprise-api \
              --create-namespace \
              --set image.repository="api" \
              --set image.tag="local" \
              --set image.pullPolicy="IfNotPresent" \
              --set env.region="dev-cluster" \
              --wait --timeout 5m
            
            echo "Verifying local deployment status..."
            kubectl get pods -n enterprise-api
            
            # Start port-forwarding and test endpoint
            kubectl port-forward service/dev-api -n enterprise-api 8080:80 &
            sleep 5
            curl -f http://localhost:8080/healthz
          else
            echo "Secret 'KUBECONFIG_DEV' is set. Deploying to remote dev cluster."
            echo "$KUBECONFIG_B64" | base64 -d > kubeconfig
            chmod 600 kubeconfig
            export KUBECONFIG="$PWD/kubeconfig"
            helm upgrade --install dev-api helm/api \
              -f helm/api/values.yaml \
              -f helm/api/values-dev.yaml \
              --namespace enterprise-api \
              --create-namespace \
              --set image.repository="${{ env.IMAGE_NAME }}" \
              --set image.tag="${{ needs.build-and-push.outputs.image_tag }}" \
              --set env.region="dev-cluster" \
              --wait --timeout 5m
          fi
